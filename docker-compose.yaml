version: "2"
services:
  MongoDB:
    image: psknowhow/mongodb:latest
    tty: true
    container_name: mongodb
    ports:
      - 27017:27017
    restart: on-failure
    volumes:
      - mongodbvol:/data/db
      - mongodbvol:/data/logs
    environment:
      - MONGODB_ADMIN_USER=admin
      - MONGODB_ADMIN_PASS=reset@123
      - MONGODB_APPLICATION_DATABASE=kpidashboard
      - MONGODB_APPLICATION_USER=devadmin
      - MONGODB_APPLICATION_PASS=admin@123
      - server_ip=<Your-IP>
    networks:
      - Network_apps

  CustomAPI:
    image: psknowhow/customapi:latest
    depends_on:
      - MongoDB
    restart: on-failure
    tty: true
    container_name: customapi
    mem_limit: 4096m
    mem_reservation: 1024m
    ports:
      - 8080:8080
    volumes:
      - customapivol:/app/logs
      - customapivol:/app/properties/
      - customapivol:/app/offline_data/
      - customapivol:/app/certs/
    environment:
      - CONFIG_LOCATION=file:/app/properties/customapi.properties
      - forgotPassword.uiHost=<Your-Public-IP>or<Your-DNS>
      - corsFilterValidOrigin=<Your-Public-IP>,localhost,<Your-DNS>
      - versionnumber=6.4.0
      - dbname=kpidashboard
      - dbusername=devadmin
      - dbpassword=admin@123
      - JAVA_OPTS-XX:+HeapDumpOnOutOfMemoryError
    links:
      - MongoDB:mongodb
    networks:
      - Network_apps

  UI:
    image: psknowhow/ui:latest
    depends_on:
      - CustomAPI
    restart: on-failure
    tty: true
    container_name: ui
    mem_limit: 1024m
    mem_reservation: 256m
    ports:
      - 80:80
      - 443:443
    volumes:
      - uivol:/var/log/nginx
      #- uivol:/etc/ssl/certs/ # If you have your SSL certificate uncomment it and copy to /app/apps/certs directory 
    links:
      - CustomAPI:customapi
    environment:
      - API_HOST=customapi
      - API_PORT=8080
      - DNS_SSL=<Your-IP>
    networks:
      - Network_apps

  Jira_Processor:
    image: psknowhow/jira-processor:latest
    depends_on:
      - MongoDB
    restart: on-failure
    tty: true
    container_name: jira-processor
    mem_limit: 4096m
    mem_reservation: 1024m
    volumes:
      - jira_processorvol:/app/logs
      - jira_processorvol:/app/properties/
      - jira_processorvol:/app/offline_data
    environment:
      - JAVA_OPTS=-XX:+HeapDumpOnOutOfMemoryError
    links:
      - MongoDB:mongodb
    networks:
      - Network_apps

  nonJira_Processor:
    image: psknowhow/nonjira-processor:latest
    depends_on:
      - MongoDB
    restart: on-failure
    tty: true
    container_name: nonjira-processor
    mem_limit: 8192m
    mem_reservation: 2048m
    volumes:
      - nonjira_processorvol:/app/logs
      - nonjira_processorvol:/app/properties/
      - nonjira_processorvol:/app/offline_data
      - nonjira_processorvol:/app/certs/
    environment:
      - JAVA_OPTS=-XX:+HeapDumpOnOutOfMemoryError
      - producer.instanceName=<Your-IP>
    links:
      - MongoDB:mongodb
    networks:
      - Network_apps

  Azure_Processor:
    image: psknowhow/azure-processor:latest
    restart: on-failure
    depends_on:
      - MongoDB
    tty: true
    container_name: azure-processor
    mem_limit: 1024m
    mem_reservation: 512m
    volumes:
      - azure_processorvol:/app/logs
      - azure_processorvol:/app/properties/
      - azure_processorvol:/app/offline_data
    environment:
      - JAVA_OPTS=-XX:+HeapDumpOnOutOfMemoryError
    links:
      - MongoDB:mongodb
    networks:
      - Network_apps

  nonAzureBoards_Processor:
    image: psknowhow/nonazureboards-processor:latest
    restart: on-failure
    depends_on:
      - MongoDB
    tty: true
    container_name: nonazureboards-processor
    mem_limit: 2048m
    mem_reservation: 1024m
    volumes:
      - nonazureboards_processorvol:/app/logs
      - nonazureboards_processorvol:/app/properties/
      - nonazureboards_processorvol:/app/offline_data
      - nonazureboards_processorvol:/app/certs/
    environment:
      - JAVA_OPTS=-XX:+HeapDumpOnOutOfMemoryError
    links:
      - MongoDB:mongodb
    networks:
      - Network_apps

  notification-consumer:
    image: psknowhow/notification-consumer:latest
    restart: on-failure
    depends_on:
      - MongoDB
    tty: true
    container_name: notification-consumer
    volumes:
      - notification-consumervol:/app/properties/
    mem_limit: 2048m
    mem_reservation: 1024m
    ports:
      - 50020:50020
    links:
      - MongoDB:mongodb
    networks:
      - Network_apps
  kafka:
    image: psknowhow/kafka:latest
    restart: on-failure
    depends_on:
      - zookeeper
    tty: true
    container_name: kafka
    mem_limit: 2048m
    mem_reservation: 1024m
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
    ports:
      - 9092:9092
    links:
      - MongoDB:mongodb
    networks:
      - Network_apps
  zookeeper:
    image: psknowhow/zookeeper:latest
    container_name: zookeeper
    mem_limit: 2048m
    mem_reservation: 1024m
    restart: always
    ports:
      - "2181:2181"
    networks:
      - Network_apps
volumes:
  notification-consumervol:
  azure_processorvol:
  nonazureboards_processorvol:
  nonjira_processorvol:
  jira_processorvol:
  uivol:
  customapivol:
  mongodbvol:

networks:
  Network_apps:
