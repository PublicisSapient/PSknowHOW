<header class="p-p-2">
    <nav class="p-d-flex p-align-center p-jc-between">
        <div class="logo">
            <img *ngIf="clientLogo" src={{clientLogo}} (click)="navigateToHomePage()" alt="Logo" />
            <img *ngIf="!clientLogo" src="assets/img/sapientLogo.png" (click)="navigateToHomePage()" alt="Logo" />
        </div>

        <!-- <ul class="p-p-0 list-style-none custom-navbar">
            <li><a class="link" routerLink="/dashboard">Dashboard</a></li>
        </ul> -->
        <p-tabMenu [model]="items" [activeItem]="activeItem"></p-tabMenu>

        <div class="p-d-flex p-align-center">
            <!-- <div class="last-sync-date-block" *ngIf="selectedTab?.toLowerCase() === 'iteration'">
                <div class="p-d-flex p-align-center p-jc-end">
                   <img *ngIf="selectedProjectLastSyncStatus === 'SUCCESS'" src="../../../assets/img/icon-success.svg" alt="Success" class="p-mr-1"/>
                   <img *ngIf="!((lastSyncData | json) == '{}') && !lastSyncData?.fetchSuccessful && !lastSyncData?.errorInFetch" src="../../../assets/img/icon-time.svg" alt="Time" class="p-mr-1" />
                   <img *ngIf="selectedProjectLastSyncStatus === 'FAILURE'" src="../../../assets/img/icon-failure.svg" alt="Failure" class="p-mr-1" />
                   <h4 class="label-text p-text-right p-mt-0 p-mb-0 p-mr-2">
                      Last Sync
                   </h4>
 
                </div>
                <p class="last-sync-date p-m-0 p-text-right">
                   {{selectedProjectLastSyncDate != 'NA' ? (selectedProjectLastSyncDate | date :'dd-MMM-yyyy (EEE) h:mm:ss a') : 'NA' }}
                </p>
            </div> -->
            <div class="p-p-2 rounded p-mr-3 position-relative filter-btn" role="button" (click)="getRecentComments()">
                <img src="../../../assets/img/ico-comments.svg" alt="Comment" />
                <span *ngIf="commentCount > 0" class="count">{{commentCount}}</span>
            </div>
            <p-menu [popup]="true" [model]="commentList"></p-menu>

            <div class="p-p-2 rounded p-mr-3 position-relative filter-btn" role="button" (click)="notification.toggle($event)">
                <img src="../../../assets/img/ico-notifications.svg" alt="Notification" />
                <span *ngIf="notificationCount > 0" class="count noti-count">{{notificationCount}}</span>
            </div>
            <p-menu #notification [popup]="true" [model]="notificationList" class="custom-menu"></p-menu>

            <div class="p-d-flex p-align-center p-jc-between" role="button">
                <i class="fa-regular fa-user custom-user p-mr-2"></i>
                <div>
                    <div class="cursor-pointer">
                        {{userDetails['user_name']}}
                    </div>
                    <p class="p-mt-1 p-mb-0 profile-budge">{{userDetails['authorities']?.length>0 ? userDetails['authorities'][0] : ''}}</p>
                </div>

            </div>
        </div>
    </nav>



</header>
